<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aurora BG — fluted glass WebGL</title>

  <!-- Component styles (relative path for the local demo; use CDN in Webflow) -->
  <link rel="stylesheet" href="../../css/effects/aurora-bg.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #14121a;
    }
    .hero {
      position: relative;
      isolation: isolate;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero__content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 760px;
      padding: 0 24px;
    }
    .hero__content h1 {
      font-size: clamp(40px, 7vw, 84px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 800;
    }
    .hero__content p {
      margin-top: 20px;
      font-size: clamp(16px, 2vw, 20px);
      color: #4a4458;
      line-height: 1.5;
    }
    .tag {
      display: inline-block;
      margin-bottom: 22px;
      font-size: 13px;
      font-weight: 600;
      color: #6b3fd4;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(120,80,220,0.18);
      padding: 6px 14px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <section class="hero">
    <!-- Decorative fluted-glass aurora layer (canvas injected by the component) -->
    <div data-aurora-bg
         data-aurora-cols="11"
         data-aurora-distort="0.035"
         data-aurora-speed="0.06"
         data-aurora-eager="true"></div>

    <div class="hero__content">
      <span class="tag">Fluted glass · saf WebGL · CDN'siz</span>
      <h1>Yapay zekâ çağının ürün zekâsı</h1>
      <p>11 dikey cam sütunu + kırılma, altında yavaş akan mor/pembe aurora.
         fluted-glass görünümünün, hiçbir dış bağımlılığı olmayan WebGL karşılığı.</p>
    </div>
  </section>

  <!-- utils first (Sestek.util), then the effect. Both relative for the demo. -->
  <script src="../../js/core/utils.js"></script>
  <script src="../../js/effects/aurora-bg.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      Sestek.initAuroraBg();
    });
  </script>
</body>
</html>
